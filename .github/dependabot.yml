version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    reviewers:
      - "katherinagieralt"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Group all @testing-library updates together
      testing-library:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
      # Group all Firebase updates together
      firebase:
        patterns:
          - "firebase"
          - "firebase-admin"
      # Group all React updates together
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      # Don't auto-update major versions of critical deps
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "github-actions"
      - "automated"
